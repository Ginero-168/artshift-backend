<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <style>
      :root {
        --fg: #202124;
        --muted: #5f6368;
        --line: rgba(0, 0, 0, 0.12);
        --accent: #1a73e8;
        --panel-alpha: 0.85;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: 'Google Sans', Roboto, Arial, sans-serif;
        color: var(--fg);
        background: transparent;
        font-size: 13px;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        height: 100%;
        background: rgba(255, 255, 255, var(--panel-alpha));
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .opacity { display: flex; align-items: center; gap: 8px; color: var(--muted); }
      .opacity input[type='range'] { flex: 1; }
      header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      header .title { font-weight: 500; font-size: 14px; }
      header .meta { color: var(--muted); font-size: 12px; }
      .toolbar {
        padding: 8px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      button {
        font: inherit;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--fg);
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
      }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button:hover { filter: brightness(0.97); }
      main { flex: 1; overflow-y: auto; padding: 8px 16px 16px; }
      .slide {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        margin: 10px 0;
      }
      .slide h3 { margin: 0 0 6px; font-size: 13px; }
      .slide .txt { white-space: pre-wrap; }
      .slide .notes { color: var(--muted); margin-top: 6px; font-style: italic; }
      .slide .tags { color: var(--muted); margin-top: 6px; font-size: 11px; }
      .empty { color: var(--muted); }
      .state { padding: 24px 16px; text-align: center; color: var(--muted); }
      .err { color: #c5221f; }
      .spinner {
        width: 18px; height: 18px; border: 2px solid var(--line);
        border-top-color: var(--accent); border-radius: 50%;
        display: inline-block; animation: spin 0.8s linear infinite; vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <span class="title" id="title">Slides Second Brain</span>
        <span class="meta" id="meta"></span>
      </header>
      <div class="toolbar">
        <button class="primary" id="refresh" onclick="load()">อ่านบริบทใหม่</button>
        <div class="opacity">
          <span>ความทึบ</span>
          <input type="range" id="alpha" min="20" max="100" value="85" oninput="setAlpha(this.value)" />
          <span id="alphaVal">85%</span>
        </div>
      </div>
      <main id="main">
        <div class="state"><span class="spinner"></span> กำลังอ่านบริบท…</div>
      </main>
    </div>

    <script>
      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function render(ctx) {
        document.getElementById('title').textContent = ctx.title || '(ไม่มีชื่อ)';
        document.getElementById('meta').textContent =
          ctx.slideCount + ' สไลด์ · ' + ctx.wordCount + ' คำ';

        var main = document.getElementById('main');
        if (!ctx.slides.length) {
          main.innerHTML = '<div class="state">ไม่มีสไลด์</div>';
          return;
        }
        main.innerHTML = ctx.slides
          .map(function (s) {
            var parts = ['<div class="slide"><h3>สไลด์ ' + s.index + '</h3>'];
            if (s.texts && s.texts.length) {
              parts.push('<div class="txt">' + esc(s.texts.join('\n')) + '</div>');
            } else {
              parts.push('<div class="empty">(ไม่มีข้อความ)</div>');
            }
            if (s.notes) {
              parts.push('<div class="notes">โน้ต: ' + esc(s.notes) + '</div>');
            }
            var tags = [];
            if (s.layout) tags.push(s.layout);
            if (s.imageCount) tags.push(s.imageCount + ' รูป');
            if (s.tableCount) tags.push(s.tableCount + ' ตาราง');
            if (tags.length) parts.push('<div class="tags">' + esc(tags.join(' · ')) + '</div>');
            parts.push('</div>');
            return parts.join('');
          })
          .join('');
      }

      function showError(err) {
        document.getElementById('main').innerHTML =
          '<div class="state err">อ่านบริบทไม่สำเร็จ: ' + esc(err && err.message ? err.message : err) + '</div>';
      }

      function setAlpha(v) {
        var a = Math.max(20, Math.min(100, Number(v))) / 100;
        document.documentElement.style.setProperty('--panel-alpha', a);
        document.getElementById('alphaVal').textContent = Math.round(a * 100) + '%';
        try { localStorage.setItem('ssb_alpha', String(v)); } catch (e) {}
      }

      function restoreAlpha() {
        var saved;
        try { saved = localStorage.getItem('ssb_alpha'); } catch (e) {}
        if (saved) {
          document.getElementById('alpha').value = saved;
          setAlpha(saved);
        }
      }

      function load() {
        document.getElementById('main').innerHTML =
          '<div class="state"><span class="spinner"></span> กำลังอ่านบริบท…</div>';
        google.script.run.withSuccessHandler(render).withFailureHandler(showError).readPresentationContext();
      }

      restoreAlpha();
      load();
    </script>
  </body>
</html>
