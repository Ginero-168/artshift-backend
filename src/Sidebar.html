<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <style>
      :root {
        --fg: #1c1917;
        --muted: #78716c;
        --line: #e7e5e4;
        --accent: #0d9488;
        --accent-2: #f59e0b;
        --surface: #fafaf9;
        --card: #ffffff;
        --success: #059669;
        --error: #dc2626;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: Sarabun, 'Noto Sans Thai', 'Thonburi', 'Leelawadee UI', 'Tahoma', Inter, Roboto, Arial, sans-serif;
        color: var(--fg);
        background: var(--surface);
        font-size: 13px;
      }
      .wrap { display: flex; flex-direction: column; height: 100%; }
      header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 10px;
        background: linear-gradient(135deg, var(--card) 0%, var(--surface) 100%);
      }
      header .mark {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background: linear-gradient(135deg, var(--accent) 0%, #14b8a6 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        font-family: Montserrat, Sarabun, sans-serif;
        flex-shrink: 0;
      }
      header .title { font-weight: 600; font-size: 14px; flex: 1; letter-spacing: -0.01em; }
      header .back { color: var(--accent); cursor: pointer; font-size: 13px; display: none; background: none; border: none; padding: 0; width: auto; }
      header .back:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      main { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
      :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      @media (prefers-reduced-motion: reduce) { .spinner { animation: none; border: 2px solid var(--accent); } }

      section { padding: 14px 0; border-bottom: 1px solid var(--line); }
      section > h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 10px;
        padding-left: 8px;
        border-left: 3px solid var(--accent);
        font-weight: 600;
      }
      section:last-child { border-bottom: none; }

      .tool-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--card);
        cursor: pointer;
        transition: transform 0.12s, border-color 0.15s, box-shadow 0.15s;
        width: 100%;
        text-align: left;
        appearance: none;
        -webkit-appearance: none;
      }
      .tool-btn:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(13,148,136,0.12); transform: translateY(-1px); }
      .tool-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .tool-btn .icon {
        width: 28px; height: 28px; border-radius: 8px; background: var(--surface);
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; color: var(--accent);
        border: 1px solid var(--line);
      }
      .tool-btn .label { font-weight: 500; font-size: 13px; }
      .tool-btn .hint { color: var(--muted); font-size: 11px; margin-top: 2px; }

      .empty-state {
        text-align: center;
        color: var(--muted);
        padding: 24px 16px;
        border: 1px dashed var(--line);
        border-radius: 10px;
        background: var(--card);
      }
      .empty-state .icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--surface);
        border: 1px solid var(--line);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: var(--accent);
        margin-bottom: 10px;
        font-weight: 700;
      }

      .quick-presets {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-bottom: 12px;
      }
      .chip {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 5px 8px;
        font-size: 11px;
        text-align: center;
        cursor: pointer;
        background: var(--card);
        color: var(--fg);
        appearance: none;
        -webkit-appearance: none;
        transition: transform 0.1s, border-color 0.15s, background 0.15s;
        font-weight: 500;
      }
      .chip:hover { border-color: var(--accent); color: var(--accent); background: #f0fdfa; }
      .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .chip:active { transform: scale(0.98); }

      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
      .field { margin-bottom: 10px; }
      .row { display: flex; gap: 10px; }
      .row > .field { flex: 1; margin-bottom: 10px; }
      input[type='text'], input[type='number'], select {
        width: 100%;
        font: inherit;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        color: var(--fg);
      }
      input[type='text']:focus, input[type='number']:focus, select:focus {
        border-color: var(--accent);
        outline: none;
        box-shadow: 0 0 0 2px rgba(13,148,136,0.15);
      }
      input[type='color'] {
        width: 100%;
        height: 32px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        cursor: pointer;
      }
      .check { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
      .check input { margin: 0; }
      .check label { margin: 0; color: var(--fg); font-size: 13px; }
      button {
        font: inherit;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--fg);
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
      }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.primary:hover { background: #0f766e; border-color: #0f766e; }
      button:hover { filter: brightness(0.98); border-color: var(--accent); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.link { width: auto; border: none; background: transparent; color: var(--accent); padding: 0; font-size: 12px; }
      button:active { transform: scale(0.99); }

      .status { font-size: 12px; margin-top: 10px; min-height: 16px; }
      .status.ok { color: var(--success); }
      .status.err { color: var(--error); }
      .preview-box {
        border: 1px dashed var(--line);
        border-radius: 12px;
        padding: 16px;
        min-height: 56px;
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--card);
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
        position: relative;
      }
      .preview-box::before {
        content: 'Live preview';
        position: absolute;
        top: -8px;
        left: 12px;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        background: var(--card);
        padding: 0 4px;
        font-weight: 600;
      }
      .preview-box .preview-text {
        max-width: 100%;
        word-break: break-word;
        line-height: 1.4;
      }

      .selected-badge {
        font-size: 12px;
        color: var(--accent);
        background: #f0fdfa;
        padding: 4px 8px;
        border-radius: 12px;
        display: inline-block;
        margin-bottom: 10px;
        font-weight: 500;
      }

      .slide {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        margin: 10px 0;
        background: var(--card);
      }
      .slide h3 { margin: 0 0 6px; font-size: 13px; color: var(--accent); }
      .slide .txt { white-space: pre-wrap; }
      .slide .notes { color: var(--muted); margin-top: 6px; font-style: italic; }
      .slide .tags { color: var(--muted); margin-top: 6px; font-size: 11px; }
      .empty { color: var(--muted); }
      .state { padding: 16px 0; text-align: center; color: var(--muted); }
      .state.err { color: var(--error); }
      .spinner {
        width: 16px; height: 16px; border: 2px solid var(--line);
        border-top-color: var(--accent); border-radius: 50%;
        display: inline-block; animation: spin 0.8s linear infinite; vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <button class="back" id="backBtn" onclick="showMain()" aria-label="กลับหน้าหลัก">← กลับ</button>
        <div class="mark" aria-hidden="true">M</div>
        <span class="title" id="pageTitle">Mighty Slide</span>
      </header>

      <main>
        <!-- ===== Main menu ===== -->
        <div id="mainView">
          <section>
            <h2>เครื่องมือ</h2>
            <button class="tool-btn" onclick="showTextPanel()" aria-label="เปิดแผงปรับข้อความ">
              <div class="icon" aria-hidden="true">T</div>
              <div>
                <div class="label">ข้อความ</div>
                <div class="hint">เลือกกล่องข้อความบนสไลด์ แล้วปรับ style</div>
              </div>
            </button>
          </section>

          <section>
            <h2>บริบทของสไลด์</h2>
            <button id="refresh" onclick="loadContext()">อ่านบริบทใหม่</button>
            <div id="ctx" aria-live="polite">
              <div class="state"><span class="spinner" aria-hidden="true"></span> กำลังอ่านบริบท…</div>
            </div>
          </section>
        </div>

        <!-- ===== Text properties panel ===== -->
        <div id="textView" class="hidden">
          <section>
            <h2>ปรับ style ข้อความ</h2>

            <div id="noSelection" class="empty-state">
              <div class="icon" aria-hidden="true">T</div>
              <div><b>ขั้นตอนที่ 1</b> บนสไลด์</div>
              <div style="font-size: 12px; margin-top: 6px;">คลิกเลือกกล่องข้อความที่ต้องการแก้ไข</div>
              <div style="font-size: 12px; margin-top: 12px;">จากนั้นกดปุ่มด้านล่าง</div>
              <button class="primary" style="margin-top: 12px;" onclick="loadSelection()">ตรวจสอบอีกครั้ง</button>
            </div>

            <div id="editor" class="hidden">
              <span class="selected-badge">✓ กำลังปรับอ็อบเจ็กต์ที่เลือก</span>

              <div class="quick-presets" role="group" aria-label="Preset ข้อความ">
                <button class="chip" onclick="applyQuick('heading')" aria-label="Apply preset หัวข้อใหญ่">หัวข้อใหญ่</button>
                <button class="chip" onclick="applyQuick('subheading')" aria-label="Apply preset หัวข้อรอง">หัวข้อรอง</button>
                <button class="chip" onclick="applyQuick('callout')" aria-label="Apply preset Callout">Callout</button>
                <button class="chip" onclick="applyQuick('quote')" aria-label="Apply preset Quote">Quote</button>
                <button class="chip" onclick="applyQuick('badge')" aria-label="Apply preset Badge">Badge</button>
                <button class="chip" onclick="applyQuick('caption')" aria-label="Apply preset คำบรรยาย">คำบรรยาย</button>
              </div>

              <div class="field">
                <label for="text">ข้อความ</label>
                <input type="text" id="text" />
              </div>
              <div class="row">
                <div class="field">
                  <label for="fontFamily">ฟอนต์</label>
                  <select id="fontFamily">
                    <option>Arial</option>
                    <option>Roboto</option>
                    <option>Montserrat</option>
                    <option>Open Sans</option>
                    <option>Lato</option>
                    <option>Times New Roman</option>
                    <option>Georgia</option>
                    <option>Verdana</option>
                    <option>Courier New</option>
                    <option>Sarabun</option>
                  </select>
                </div>
                <div class="field" style="max-width: 90px">
                  <label for="fontSize">ขนาด</label>
                  <input type="number" id="fontSize" min="6" max="400" />
                </div>
              </div>
              <div class="check">
                <input type="checkbox" id="bold" />
                <label for="bold">ตัวหนา</label>
              </div>
              <div class="row">
                <div class="field">
                  <label for="align">จัดชิด</label>
                  <select id="align">
                    <option value="START">ซ้าย</option>
                    <option value="CENTER">กึ่งกลาง</option>
                    <option value="END">ขวา</option>
                  </select>
                </div>
                <div class="field">
                  <label for="textColor">สีตัวอักษร</label>
                  <input type="color" id="textColor" />
                </div>
              </div>
              <div class="row">
                <div class="field">
                  <label for="backgroundColor">สีพื้นหลัง</label>
                  <input type="color" id="backgroundColor" disabled />
                </div>
                <div class="field">
                  <label for="borderColor">สีกรอบ</label>
                  <input type="color" id="borderColor" disabled />
                </div>
              </div>
              <div class="check">
                <input type="checkbox" id="hasBackground" onchange="toggle('hasBackground','backgroundColor')" />
                <label for="hasBackground">ใส่พื้นหลัง</label>
              </div>
              <div class="check">
                <input type="checkbox" id="hasBorder" onchange="toggleBorder()" />
                <label for="hasBorder">ใส่กรอบ</label>
              </div>
              <div class="row">
                <div class="field" style="max-width: 110px">
                  <label for="borderWeight">ความหนา</label>
                  <select id="borderWeight" disabled>
                    <option value="1">บาง</option>
                    <option value="2">กลาง</option>
                    <option value="4">หนา</option>
                  </select>
                </div>
                <div class="field">
                  <label for="borderDash">แบบเส้น</label>
                  <select id="borderDash" disabled>
                    <option value="SOLID">เส้นทึบ</option>
                    <option value="DASH">เส้นประ</option>
                    <option value="DOT">เส้นจุด</option>
                    <option value="DASH_DOT">ประ-จุด</option>
                  </select>
                </div>
              </div>

              <button class="primary" id="applyBtn" onclick="applyToSelection()">Apply ลงอ็อบเจ็กต์ที่เลือก</button>
              <button id="insertBtn" onclick="insertTextBox()" style="margin-top: 8px;">Insert กล่องข้อความใหม่</button>
              <div class="status" id="status" aria-live="polite"></div>
              <div class="preview-box" aria-label="ตัวอย่าง style">
                <div class="preview-text" id="previewText">ตัวอย่าง</div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script>
      var QUICK_STYLES = {
        heading: { fontFamily: 'Montserrat', fontSize: 44, bold: true, textColor: '#202124', align: 'CENTER', hasBackground: false, hasBorder: false },
        subheading: { fontFamily: 'Roboto', fontSize: 28, bold: false, textColor: '#5f6368', align: 'START', hasBackground: false, hasBorder: false },
        caption: { fontFamily: 'Roboto', fontSize: 14, bold: false, textColor: '#5f6368', align: 'START', hasBackground: false, hasBorder: false },
        callout: { fontFamily: 'Roboto', fontSize: 18, bold: false, textColor: '#1a73e8', align: 'CENTER', hasBackground: true, backgroundColor: '#e8f0fe', hasBorder: true, borderColor: '#1a73e8', borderWeight: 2, borderDash: 'SOLID' },
        quote: { fontFamily: 'Georgia', fontSize: 24, bold: false, textColor: '#202124', align: 'CENTER', hasBackground: false, hasBorder: true, borderColor: '#dadce0', borderWeight: 4, borderDash: 'SOLID' },
        badge: { fontFamily: 'Arial', fontSize: 14, bold: true, textColor: '#ffffff', align: 'CENTER', hasBackground: true, backgroundColor: '#ea4335', hasBorder: false }
      };

      function $(id) { return document.getElementById(id); }
      function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

      function toggle(checkId, targetId) { $(targetId).disabled = !$(checkId).checked; }
      function toggleBorder() {
        var on = $('hasBorder').checked;
        ['borderColor', 'borderWeight', 'borderDash'].forEach(function (id) { $(id).disabled = !on; });
      }

      function setStatus(msg, kind) {
        var el = $('status');
        el.textContent = msg || '';
        el.className = 'status' + (kind ? ' ' + kind : '');
      }

      function showMain() {
        $('mainView').classList.remove('hidden');
        $('textView').classList.add('hidden');
        $('backBtn').style.display = 'none';
        $('pageTitle').textContent = 'Mighty Slide';
      }

      function showTextPanel() {
        $('mainView').classList.add('hidden');
        $('textView').classList.remove('hidden');
        $('backBtn').style.display = 'inline';
        $('pageTitle').textContent = 'ข้อความ';
        loadSelection();
      }

      function setEditorVisible(visible) {
        $('noSelection').classList.toggle('hidden', visible);
        $('editor').classList.toggle('hidden', !visible);
      }

      function populateForm(style) {
        $('text').value = style.text || '';
        $('fontFamily').value = style.fontFamily || 'Arial';
        $('fontSize').value = style.fontSize || 18;
        $('bold').checked = !!style.bold;
        $('align').value = style.align || 'START';
        $('textColor').value = style.textColor || '#202124';
        $('hasBackground').checked = !!style.hasBackground;
        $('backgroundColor').value = style.backgroundColor || '#fde293';
        $('backgroundColor').disabled = !$('hasBackground').checked;
        $('hasBorder').checked = !!style.hasBorder;
        $('borderColor').value = style.borderColor || '#1a73e8';
        $('borderWeight').value = style.borderWeight || 1;
        $('borderDash').value = style.borderDash || 'SOLID';
        ['borderColor', 'borderWeight', 'borderDash'].forEach(function (id) { $(id).disabled = !$('hasBorder').checked; });
        updatePreview();
      }

      function readForm() {
        return {
          text: $('text').value,
          fontFamily: $('fontFamily').value,
          fontSize: Number($('fontSize').value) || 18,
          bold: $('bold').checked,
          align: $('align').value,
          textColor: $('textColor').value,
          hasBackground: $('hasBackground').checked,
          backgroundColor: $('backgroundColor').value,
          hasBorder: $('hasBorder').checked,
          borderColor: $('borderColor').value,
          borderWeight: Number($('borderWeight').value) || 1,
          borderDash: $('borderDash').value
        };
      }

      function loadSelection() {
        $('noSelection').innerHTML = '<div class="state"><span class="spinner"></span> กำลังเช็กการเลือก…</div>';
        google.script.run
          .withSuccessHandler(function (style) {
            if (!style || !style.selected) {
              setEditorVisible(false);
              renderNoSelection(style && style.reason ? style.reason : 'no_selection');
              return;
            }
            setEditorVisible(true);
            populateForm(style);
            setStatus('โหลดคุณสมบัติจากอ็อบเจ็กต์ที่เลือกแล้ว');
          })
          .withFailureHandler(function (err) {
            setEditorVisible(false);
            renderNoSelection('error', err && err.message ? err.message : err);
          })
          .readSelectedShapeStyle();
      }

      function renderNoSelection(reason, detail) {
        var messages = {
          no_selection: 'ไม่พบอ็อบเจ็กต์ที่เลือก',
          text_cursor: 'คุณกำลังอยู่ในโหมดแก้ไขข้อความ — ให้คลิกที่เส้นขอบกล่องข้อความ (ไม่ใช่ตัวอักษร)',
          group_selected: 'คุณเลือกกลุ่ม (group) — ให้คลิกเลือกกล่องข้อความภายในกลุ่มหรือ ungroup ก่อน',
          image_selected: 'คุณเลือกรูปภาพ — ระบบรองรับเฉพาะกล่องข้อความ',
          unsupported_type: 'อ็อบเจ็กต์ที่เลือกไม่รองรับ',
          error: 'เกิดข้อผิดพลาด: ' + (detail || '')
        };
        var detailLine = detail ? '<div style="font-size: 11px; color: #888; margin-top: 4px;">' + esc(detail) + '</div>' : '';
        $('noSelection').innerHTML =
          '<div class="icon" aria-hidden="true">🖱</div>' +
          '<div><b>ขั้นตอนที่ 1</b> บนสไลด์</div>' +
          '<div style="font-size: 12px; margin-top: 6px;">คลิกเลือกกล่องข้อความที่ต้องการแก้ไข</div>' +
          '<div style="font-size: 12px; color: #c5221f; margin-top: 8px;">' + (messages[reason] || messages.no_selection) + '</div>' +
          detailLine +
          '<button class="primary" style="margin-top: 12px;" onclick="loadSelection()">ตรวจสอบอีกครั้ง</button>' +
          '<button style="margin-top: 8px;" onclick="showDebug()">แสดงข้อมูลการเลือก (debug)</button>' +
          '<pre id="debugOutput" style="font-size: 10px; text-align: left; background: #f8f9fa; padding: 8px; border-radius: 6px; margin-top: 8px; display: none; white-space: pre-wrap; word-break: break-all;"></pre>';
      }

      function showDebug() {
        var out = $('debugOutput');
        out.style.display = 'block';
        out.textContent = 'กำลังเช็ก…';
        google.script.run
          .withSuccessHandler(function (info) {
            out.textContent = JSON.stringify(info, null, 2);
          })
          .withFailureHandler(function (err) {
            out.textContent = 'ERROR: ' + (err && err.message ? err.message : err);
          })
          .getSelectionDebug();
      }

      function applyToSelection() {
        $('applyBtn').disabled = true;
        setStatus('กำลัง apply…');
        google.script.run
          .withSuccessHandler(function (res) {
            $('applyBtn').disabled = false;
            if (!res.ok) {
              setStatus('ไม่มีอ็อบเจ็กต์ที่เลือก — กรุณาเลือกกล่องข้อความบนสไลด์', 'err');
              setEditorVisible(false);
            } else {
              setStatus('Apply สำเร็จ', 'ok');
              loadContext();
            }
          })
          .withFailureHandler(function (err) {
            $('applyBtn').disabled = false;
            setStatus('Apply ไม่สำเร็จ: ' + (err && err.message ? err.message : err), 'err');
          })
          .applyToSelectedShape(readForm());
      }

      function insertTextBox() {
        $('insertBtn').disabled = true;
        setStatus('กำลัง insert…');
        google.script.run
          .withSuccessHandler(function (res) {
            $('insertBtn').disabled = false;
            if (!res || !res.ok) {
              setStatus('Insert ไม่สำเร็จ', 'err');
              return;
            }
            setStatus('Insert สำเร็จ', 'ok');
            loadContext();
          })
          .withFailureHandler(function (err) {
            $('insertBtn').disabled = false;
            setStatus('Insert ไม่สำเร็จ: ' + (err && err.message ? err.message : err), 'err');
          })
          .addTextBox(readForm());
      }

      function applyQuick(name) {
        var base = readForm();
        var style = QUICK_STYLES[name];
        if (!style) return;
        var merged = Object.assign({}, base, style);
        populateForm(merged);
        updatePreview();
        setStatus('');
      }

      function updatePreview() {
        var style = readForm();
        var el = $('previewText');
        if (!el) return;
        var dashMap = { SOLID: 'solid', DASH: 'dashed', DOT: 'dotted', DASH_DOT: 'dashed' };
        el.textContent = style.text || 'ตัวอย่าง';
        el.style.fontFamily = style.fontFamily || 'Arial';
        el.style.fontSize = (style.fontSize || 18) + 'px';
        el.style.fontWeight = style.bold ? 'bold' : 'normal';
        el.style.color = style.textColor || '#202124';
        el.style.textAlign = style.align === 'CENTER' ? 'center' : (style.align === 'END' ? 'right' : 'left');
        el.style.backgroundColor = style.hasBackground ? (style.backgroundColor || '#fde293') : 'transparent';
        el.style.padding = style.hasBackground ? '4px 8px' : '0';
        el.style.borderRadius = style.hasBackground ? '4px' : '0';
        el.style.border = style.hasBorder ? (style.borderWeight || 1) + 'px ' + (dashMap[style.borderDash] || 'solid') + ' ' + (style.borderColor || '#1a73e8') : 'none';
      }

      function bindPreview() {
        ['text', 'fontFamily', 'fontSize', 'bold', 'align', 'textColor', 'backgroundColor', 'hasBackground', 'borderColor', 'borderWeight', 'borderDash', 'hasBorder'].forEach(function (id) {
          var el = $(id);
          if (!el) return;
          var event = (el.type === 'checkbox' || el.tagName === 'SELECT') ? 'change' : 'input';
          el.addEventListener(event, updatePreview);
        });
      }

      function renderContext(ctx) {
        var box = $('ctx');
        if (!ctx.slides.length) { box.innerHTML = '<div class="state">ไม่มีสไลด์</div>'; return; }
        box.innerHTML = ctx.slides.map(function (s) {
          var parts = ['<div class="slide"><h3>สไลด์ ' + s.index + '</h3>'];
          if (s.texts && s.texts.length) parts.push('<div class="txt">' + esc(s.texts.join('\n')) + '</div>'); else parts.push('<div class="empty">(ไม่มีข้อความ)</div>');
          if (s.notes) parts.push('<div class="notes">โน้ต: ' + esc(s.notes) + '</div>');
          var tags = [];
          if (s.layout) tags.push(s.layout);
          if (s.imageCount) tags.push(s.imageCount + ' รูป');
          if (s.tableCount) tags.push(s.tableCount + ' ตาราง');
          if (tags.length) parts.push('<div class="tags">' + esc(tags.join(' · ')) + '</div>');
          parts.push('</div>');
          return parts.join('');
        }).join('');
      }

      function loadContext() {
        $('ctx').innerHTML = '<div class="state"><span class="spinner" aria-hidden="true"></span> กำลังอ่านบริบท…</div>';
        google.script.run
          .withSuccessHandler(renderContext)
          .withFailureHandler(function (err) {
            $('ctx').innerHTML = '<div class="state err">อ่านบริบทไม่สำเร็จ: ' + esc(err && err.message ? err.message : err) + '</div>';
          })
          .readPresentationContext();
      }

      bindPreview();
      loadContext();
    </script>
  </body>
</html>
