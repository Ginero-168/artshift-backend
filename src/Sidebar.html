<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <style>
      :root {
        --fg: #202124;
        --muted: #5f6368;
        --line: #e0e0e0;
        --accent: #1a73e8;
        --surface: #f8f9fa;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: 'Google Sans', Roboto, Arial, sans-serif;
        color: var(--fg);
        background: #fff;
        font-size: 13px;
      }
      .wrap { display: flex; flex-direction: column; height: 100%; }
      header { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
      header .title { font-weight: 500; font-size: 14px; flex: 1; }
      header .back { color: var(--accent); cursor: pointer; font-size: 13px; display: none; }
      main { flex: 1; overflow-y: auto; padding: 0 16px 16px; }

      section { padding: 14px 0; border-bottom: 1px solid var(--line); }
      section > h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin: 0 0 10px;
      }
      section:last-child { border-bottom: none; }

      .tool-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .tool-btn:hover { border-color: var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
      .tool-btn .icon {
        width: 28px; height: 28px; border-radius: 6px; background: var(--surface);
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; color: var(--accent);
      }
      .tool-btn .label { font-weight: 500; font-size: 13px; }
      .tool-btn .hint { color: var(--muted); font-size: 11px; margin-top: 2px; }

      .empty-state {
        text-align: center;
        color: var(--muted);
        padding: 24px 16px;
        border: 1px dashed var(--line);
        border-radius: 8px;
      }
      .empty-state .icon { font-size: 24px; margin-bottom: 8px; }

      .quick-presets {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-bottom: 12px;
      }
      .chip {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 5px 8px;
        font-size: 11px;
        text-align: center;
        cursor: pointer;
        background: #fff;
      }
      .chip:hover { border-color: var(--accent); color: var(--accent); }

      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
      .field { margin-bottom: 10px; }
      .row { display: flex; gap: 10px; }
      .row > .field { flex: 1; margin-bottom: 10px; }
      input[type='text'], input[type='number'], select {
        width: 100%;
        font: inherit;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--fg);
      }
      input[type='color'] {
        width: 100%;
        height: 32px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .check { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
      .check input { margin: 0; }
      .check label { margin: 0; color: var(--fg); font-size: 13px; }
      button {
        font: inherit;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--fg);
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
      }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button:hover { filter: brightness(0.97); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.link { width: auto; border: none; background: transparent; color: var(--accent); padding: 0; font-size: 12px; }

      .status { font-size: 12px; margin-top: 10px; min-height: 16px; }
      .status.ok { color: #188038; }
      .status.err { color: #c5221f; }

      .selected-badge {
        font-size: 12px;
        color: var(--accent);
        background: #e8f0fe;
        padding: 4px 8px;
        border-radius: 12px;
        display: inline-block;
        margin-bottom: 10px;
      }

      .slide {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        margin: 10px 0;
      }
      .slide h3 { margin: 0 0 6px; font-size: 13px; }
      .slide .txt { white-space: pre-wrap; }
      .slide .notes { color: var(--muted); margin-top: 6px; font-style: italic; }
      .slide .tags { color: var(--muted); margin-top: 6px; font-size: 11px; }
      .empty { color: var(--muted); }
      .state { padding: 16px 0; text-align: center; color: var(--muted); }
      .state.err { color: #c5221f; }
      .spinner {
        width: 16px; height: 16px; border: 2px solid var(--line);
        border-top-color: var(--accent); border-radius: 50%;
        display: inline-block; animation: spin 0.8s linear infinite; vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <span class="back" id="backBtn" onclick="showMain()">← กลับ</span>
        <span class="title" id="pageTitle">Mighty Slide</span>
      </header>

      <main>
        <!-- ===== Main menu ===== -->
        <div id="mainView">
          <section>
            <h2>เครื่องมือ</h2>
            <div class="tool-btn" onclick="showTextPanel()">
              <div class="icon">T</div>
              <div>
                <div class="label">ข้อความ</div>
                <div class="hint">เลือกกล่องข้อความบนสไลด์ แล้วปรับ style</div>
              </div>
            </div>
          </section>

          <section>
            <h2>บริบทของสไลด์</h2>
            <button id="refresh" onclick="loadContext()">อ่านบริบทใหม่</button>
            <div id="ctx">
              <div class="state"><span class="spinner"></span> กำลังอ่านบริบท…</div>
            </div>
          </section>
        </div>

        <!-- ===== Text properties panel ===== -->
        <div id="textView" class="hidden">
          <section>
            <h2>ปรับ style ข้อความ</h2>

            <div id="noSelection" class="empty-state">
              <div class="icon">🖱</div>
              <div>เลือกกล่องข้อความบนสไลด์ก่อน</div>
            </div>

            <div id="editor" class="hidden">
              <span class="selected-badge">✓ กำลังปรับอ็อบเจ็กต์ที่เลือก</span>

              <div class="quick-presets">
                <div class="chip" onclick="applyQuick('heading')">หัวข้อใหญ่</div>
                <div class="chip" onclick="applyQuick('subheading')">หัวข้อรอง</div>
                <div class="chip" onclick="applyQuick('callout')">Callout</div>
                <div class="chip" onclick="applyQuick('quote')">Quote</div>
                <div class="chip" onclick="applyQuick('badge')">Badge</div>
                <div class="chip" onclick="applyQuick('caption')">คำบรรยาย</div>
              </div>

              <div class="field">
                <label for="text">ข้อความ</label>
                <input type="text" id="text" />
              </div>
              <div class="row">
                <div class="field">
                  <label for="fontFamily">ฟอนต์</label>
                  <select id="fontFamily">
                    <option>Arial</option>
                    <option>Roboto</option>
                    <option>Montserrat</option>
                    <option>Open Sans</option>
                    <option>Lato</option>
                    <option>Times New Roman</option>
                    <option>Georgia</option>
                    <option>Verdana</option>
                    <option>Courier New</option>
                    <option>Sarabun</option>
                  </select>
                </div>
                <div class="field" style="max-width: 90px">
                  <label for="fontSize">ขนาด</label>
                  <input type="number" id="fontSize" min="6" max="400" />
                </div>
              </div>
              <div class="check">
                <input type="checkbox" id="bold" />
                <label for="bold">ตัวหนา</label>
              </div>
              <div class="row">
                <div class="field">
                  <label for="align">จัดชิด</label>
                  <select id="align">
                    <option value="START">ซ้าย</option>
                    <option value="CENTER">กึ่งกลาง</option>
                    <option value="END">ขวา</option>
                  </select>
                </div>
                <div class="field">
                  <label for="textColor">สีตัวอักษร</label>
                  <input type="color" id="textColor" />
                </div>
              </div>
              <div class="row">
                <div class="field">
                  <label for="backgroundColor">สีพื้นหลัง</label>
                  <input type="color" id="backgroundColor" disabled />
                </div>
                <div class="field">
                  <label for="borderColor">สีกรอบ</label>
                  <input type="color" id="borderColor" disabled />
                </div>
              </div>
              <div class="check">
                <input type="checkbox" id="hasBackground" onchange="toggle('hasBackground','backgroundColor')" />
                <label for="hasBackground">ใส่พื้นหลัง</label>
              </div>
              <div class="check">
                <input type="checkbox" id="hasBorder" onchange="toggleBorder()" />
                <label for="hasBorder">ใส่กรอบ</label>
              </div>
              <div class="row">
                <div class="field" style="max-width: 110px">
                  <label for="borderWeight">ความหนา</label>
                  <select id="borderWeight" disabled>
                    <option value="1">บาง</option>
                    <option value="2">กลาง</option>
                    <option value="4">หนา</option>
                  </select>
                </div>
                <div class="field">
                  <label for="borderDash">แบบเส้น</label>
                  <select id="borderDash" disabled>
                    <option value="SOLID">เส้นทึบ</option>
                    <option value="DASH">เส้นประ</option>
                    <option value="DOT">เส้นจุด</option>
                    <option value="DASH_DOT">ประ-จุด</option>
                  </select>
                </div>
              </div>

              <button class="primary" id="applyBtn" onclick="applyToSelection()">Apply ลงอ็อบเจ็กต์ที่เลือก</button>
              <div class="status" id="status"></div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script>
      var QUICK_STYLES = {
        heading: { fontFamily: 'Montserrat', fontSize: 44, bold: true, textColor: '#202124', align: 'CENTER', hasBackground: false, hasBorder: false },
        subheading: { fontFamily: 'Roboto', fontSize: 28, bold: false, textColor: '#5f6368', align: 'START', hasBackground: false, hasBorder: false },
        caption: { fontFamily: 'Roboto', fontSize: 14, bold: false, textColor: '#5f6368', align: 'START', hasBackground: false, hasBorder: false },
        callout: { fontFamily: 'Roboto', fontSize: 18, bold: false, textColor: '#1a73e8', align: 'CENTER', hasBackground: true, backgroundColor: '#e8f0fe', hasBorder: true, borderColor: '#1a73e8', borderWeight: 2, borderDash: 'SOLID' },
        quote: { fontFamily: 'Georgia', fontSize: 24, bold: false, textColor: '#202124', align: 'CENTER', hasBackground: false, hasBorder: true, borderColor: '#dadce0', borderWeight: 4, borderDash: 'SOLID' },
        badge: { fontFamily: 'Arial', fontSize: 14, bold: true, textColor: '#ffffff', align: 'CENTER', hasBackground: true, backgroundColor: '#ea4335', hasBorder: false }
      };

      function $(id) { return document.getElementById(id); }
      function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

      function toggle(checkId, targetId) { $(targetId).disabled = !$(checkId).checked; }
      function toggleBorder() {
        var on = $('hasBorder').checked;
        ['borderColor', 'borderWeight', 'borderDash'].forEach(function (id) { $(id).disabled = !on; });
      }

      function setStatus(msg, kind) {
        var el = $('status');
        el.textContent = msg || '';
        el.className = 'status' + (kind ? ' ' + kind : '');
      }

      function showMain() {
        $('mainView').classList.remove('hidden');
        $('textView').classList.add('hidden');
        $('backBtn').style.display = 'none';
        $('pageTitle').textContent = 'Mighty Slide';
      }

      function showTextPanel() {
        $('mainView').classList.add('hidden');
        $('textView').classList.remove('hidden');
        $('backBtn').style.display = 'inline';
        $('pageTitle').textContent = 'ข้อความ';
        loadSelection();
      }

      function setEditorVisible(visible) {
        $('noSelection').classList.toggle('hidden', visible);
        $('editor').classList.toggle('hidden', !visible);
      }

      function populateForm(style) {
        $('text').value = style.text || '';
        $('fontFamily').value = style.fontFamily || 'Arial';
        $('fontSize').value = style.fontSize || 18;
        $('bold').checked = !!style.bold;
        $('align').value = style.align || 'START';
        $('textColor').value = style.textColor || '#202124';
        $('hasBackground').checked = !!style.hasBackground;
        $('backgroundColor').value = style.backgroundColor || '#fde293';
        $('backgroundColor').disabled = !$('hasBackground').checked;
        $('hasBorder').checked = !!style.hasBorder;
        $('borderColor').value = style.borderColor || '#1a73e8';
        $('borderWeight').value = style.borderWeight || 1;
        $('borderDash').value = style.borderDash || 'SOLID';
        ['borderColor', 'borderWeight', 'borderDash'].forEach(function (id) { $(id).disabled = !$('hasBorder').checked; });
      }

      function readForm() {
        return {
          text: $('text').value,
          fontFamily: $('fontFamily').value,
          fontSize: Number($('fontSize').value) || 18,
          bold: $('bold').checked,
          align: $('align').value,
          textColor: $('textColor').value,
          hasBackground: $('hasBackground').checked,
          backgroundColor: $('backgroundColor').value,
          hasBorder: $('hasBorder').checked,
          borderColor: $('borderColor').value,
          borderWeight: Number($('borderWeight').value) || 1,
          borderDash: $('borderDash').value
        };
      }

      function loadSelection() {
        setStatus('กำลังเช็กการเลือก…');
        google.script.run
          .withSuccessHandler(function (style) {
            if (!style || !style.selected) {
              setEditorVisible(false);
              setStatus('');
              return;
            }
            setEditorVisible(true);
            populateForm(style);
            setStatus('โหลดคุณสมบัติจากอ็อบเจ็กต์ที่เลือกแล้ว');
          })
          .withFailureHandler(function (err) {
            setEditorVisible(false);
            setStatus('เช็กการเลือกไม่สำเร็จ: ' + (err && err.message ? err.message : err), 'err');
          })
          .readSelectedShapeStyle();
      }

      function applyToSelection() {
        $('applyBtn').disabled = true;
        setStatus('กำลัง apply…');
        google.script.run
          .withSuccessHandler(function (res) {
            $('applyBtn').disabled = false;
            if (!res.ok) {
              setStatus('ไม่มีอ็อบเจ็กต์ที่เลือก — กรุณาเลือกกล่องข้อความบนสไลด์', 'err');
              setEditorVisible(false);
            } else {
              setStatus('Apply สำเร็จ', 'ok');
              loadContext();
            }
          })
          .withFailureHandler(function (err) {
            $('applyBtn').disabled = false;
            setStatus('Apply ไม่สำเร็จ: ' + (err && err.message ? err.message : err), 'err');
          })
          .applyToSelectedShape(readForm());
      }

      function applyQuick(name) {
        var base = readForm();
        var style = QUICK_STYLES[name];
        if (!style) return;
        var merged = Object.assign({}, base, style);
        populateForm(merged);
        setStatus('');
      }

      function renderContext(ctx) {
        var box = $('ctx');
        if (!ctx.slides.length) { box.innerHTML = '<div class="state">ไม่มีสไลด์</div>'; return; }
        box.innerHTML = ctx.slides.map(function (s) {
          var parts = ['<div class="slide"><h3>สไลด์ ' + s.index + '</h3>'];
          if (s.texts && s.texts.length) parts.push('<div class="txt">' + esc(s.texts.join('\n')) + '</div>'); else parts.push('<div class="empty">(ไม่มีข้อความ)</div>');
          if (s.notes) parts.push('<div class="notes">โน้ต: ' + esc(s.notes) + '</div>');
          var tags = [];
          if (s.layout) tags.push(s.layout);
          if (s.imageCount) tags.push(s.imageCount + ' รูป');
          if (s.tableCount) tags.push(s.tableCount + ' ตาราง');
          if (tags.length) parts.push('<div class="tags">' + esc(tags.join(' · ')) + '</div>');
          parts.push('</div>');
          return parts.join('');
        }).join('');
      }

      function loadContext() {
        $('ctx').innerHTML = '<div class="state"><span class="spinner"></span> กำลังอ่านบริบท…</div>';
        google.script.run
          .withSuccessHandler(renderContext)
          .withFailureHandler(function (err) {
            $('ctx').innerHTML = '<div class="state err">อ่านบริบทไม่สำเร็จ: ' + esc(err && err.message ? err.message : err) + '</div>';
          })
          .readPresentationContext();
      }

      loadContext();
    </script>
  </body>
</html>
