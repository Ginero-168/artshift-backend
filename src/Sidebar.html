<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <style>
      :root {
        --fg: #202124;
        --muted: #5f6368;
        --line: #e0e0e0;
        --accent: #1a73e8;
        --surface: #f8f9fa;
        --danger: #ea4335;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: 'Google Sans', Roboto, Arial, sans-serif;
        color: var(--fg);
        background: #fff;
        font-size: 13px;
      }
      .wrap { display: flex; flex-direction: column; height: 100%; }
      header { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
      header .back { color: var(--accent); cursor: pointer; font-size: 13px; display: none; }
      main { flex: 1; overflow-y: auto; padding: 0 16px 16px; }

      section { padding: 14px 0; border-bottom: 1px solid var(--line); }
      section > h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin: 0 0 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      section:last-child { border-bottom: none; }

      .tool-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .tool-btn:hover { border-color: var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
      .tool-btn .icon {
        width: 28px; height: 28px; border-radius: 6px; background: var(--surface);
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; color: var(--accent);
      }
      .tool-btn .label { font-weight: 500; font-size: 13px; }
      .tool-btn .hint { color: var(--muted); font-size: 11px; margin-top: 2px; }

      .preset-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .preset-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        background: #fff;
        transition: border-color 0.15s, box-shadow 0.15s;
        position: relative;
        height: 110px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
      }
      .preset-card:hover { border-color: var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
      .preset-card .preview {
        pointer-events: none;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        overflow: hidden;
      }
      .preset-card .preview span {
        max-width: 100%;
        max-height: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
      }
      .preset-card .label { font-size: 12px; text-align: center; color: var(--muted); margin-top: 6px; }
      .preset-card .delete {
        position: absolute;
        top: 4px; right: 4px;
        width: 18px; height: 18px;
        border-radius: 50%;
        background: #fff;
        color: var(--danger);
        border: 1px solid var(--line);
        font-size: 11px;
        line-height: 16px;
        text-align: center;
        cursor: pointer;
        display: none;
      }
      .preset-card.custom .delete { display: block; }
      .preset-card.custom .delete:hover { background: #fce8e6; border-color: var(--danger); }

      .status { font-size: 12px; margin-top: 10px; min-height: 16px; }
      .status.ok { color: #188038; }
      .status.err { color: #c5221f; }

      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
      .field { margin-bottom: 10px; }
      .row { display: flex; gap: 10px; }
      .row > .field { flex: 1; margin-bottom: 10px; }
      input[type='text'], input[type='number'], select {
        width: 100%;
        font: inherit;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--fg);
      }
      input[type='color'] {
        width: 100%;
        height: 32px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .check { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
      .check input { margin: 0; }
      .check label { margin: 0; color: var(--fg); font-size: 13px; }
      button {
        font: inherit;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--fg);
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
      }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button:hover { filter: brightness(0.97); }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      button.link { width: auto; border: none; background: transparent; color: var(--accent); padding: 0; font-size: 12px; }

      .slide {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        margin: 10px 0;
      }
      .slide h3 { margin: 0 0 6px; font-size: 13px; }
      .slide .txt { white-space: pre-wrap; }
      .slide .notes { color: var(--muted); margin-top: 6px; font-style: italic; }
      .slide .tags { color: var(--muted); margin-top: 6px; font-size: 11px; }
      .empty { color: var(--muted); }
      .state { padding: 16px 0; text-align: center; color: var(--muted); }
      .state.err { color: #c5221f; }
      .spinner {
        width: 16px; height: 16px; border: 2px solid var(--line);
        border-top-color: var(--accent); border-radius: 50%;
        display: inline-block; animation: spin 0.8s linear infinite; vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .hidden { display: none !important; }

      .anim-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 10px;
      }
      .anim-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 6px;
        cursor: pointer;
        background: #fff;
        text-align: center;
        transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
        font-size: 11px;
        min-height: 90px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
      }
      .anim-card:hover { border-color: var(--accent); box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
      .anim-card.selected { border-color: var(--accent); background: #e8f0fe; color: var(--accent); font-weight: 500; }
      .anim-card .preview {
        width: 80px;
        height: 30px;
        object-fit: contain;
        border-radius: 4px;
        background: #f8f9fa;
        margin-bottom: 4px;
      }
      .anim-card .label { display: block; line-height: 1.2; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <span class="back" id="backBtn" onclick="goBack()">← กลับ</span>
      </header>

      <main>
        <!-- ===== Main menu ===== -->
        <div id="mainView">
          <section>
            <h2>เครื่องมือ</h2>
            <div class="tool-btn" onclick="showTextPresets()">
              <div class="icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 7V5h16v2"></path>
                  <path d="M12 5v14"></path>
                  <path d="M9 19h6"></path>
                </svg>
              </div>
              <div>
                <div class="label">Text</div>
              </div>
            </div>
            <div class="tool-btn" style="margin-top: 10px;" onclick="showAnimateForm()">
              <div class="icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
              </div>
              <div>
                <div class="label">Animate Text</div>
              </div>
            </div>
          </section>

          <section>
            <h2>บริบทของสไลด์</h2>
            <button id="refresh" onclick="loadContext()">อ่านบริบทใหม่</button>
            <div id="ctx">
              <div class="state"><span class="spinner"></span> กำลังอ่านบริบท…</div>
            </div>
          </section>
        </div>

        <!-- ===== Text presets ===== -->
        <div id="textView" class="hidden">
          <section>
            <h2>เลือกบล็อกข้อความ</h2>
            <div class="preset-grid" id="textPresets"></div>
            <div class="status" id="status"></div>
          </section>

          <section>
            <h2>
              <span>ของฉัน</span>
              <button class="link" onclick="showCustomForm()">+ สร้าง preset</button>
            </h2>
            <div class="preset-grid" id="customPresets"></div>
          </section>
        </div>

        <!-- ===== Animate text form ===== -->
        <div id="animateView" class="hidden">
          <section>
            <h2>สร้างข้อความเคลื่อนไหว</h2>
            <div class="field">
              <label for="aText">ข้อความ</label>
              <input type="text" id="aText" value="สวัสดี Mighty Slide" />
            </div>
            <div class="field">
              <label>เอฟเฟกต์</label>
              <div class="anim-grid" id="animGrid"></div>
              <input type="hidden" id="aAnimation" value="fade-in" />
            </div>
            <div class="field" style="max-width: 120px">
              <label for="aDuration">วินาที</label>
              <input type="number" id="aDuration" value="2" min="1" max="5" step="0.5" />
            </div>
            <div class="row">
              <div class="field">
                <label for="aFont">ฟอนต์</label>
                <select id="aFont">
                  <option>Sarabun</option>
                  <option>Montserrat</option>
                  <option>Roboto</option>
                  <option>Arial</option>
                  <option>Open Sans</option>
                  <option>Georgia</option>
                  <option>Courier New</option>
                </select>
              </div>
              <div class="field" style="max-width: 90px">
                <label for="aFontSize">ขนาด</label>
                <input type="number" id="aFontSize" value="64" min="12" max="200" />
              </div>
            </div>
            <div class="check">
              <input type="checkbox" id="aBold" checked />
              <label for="aBold">ตัวหนา</label>
            </div>
            <div class="check">
              <input type="checkbox" id="aTransparent" />
              <label for="aTransparent">พื้นหลังโปร่งใส</label>
            </div>
            <div class="row">
              <div class="field">
                <label for="aTextColor">สีตัวอักษร</label>
                <input type="color" id="aTextColor" value="#ffffff" />
              </div>
              <div class="field">
                <label for="aBgColor">สีพื้นหลัง</label>
                <input type="color" id="aBgColor" value="#1a73e8" />
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label for="aWidth">กว้าง (px)</label>
                <input type="number" id="aWidth" value="640" min="100" max="1200" step="10" />
              </div>
              <div class="field">
                <label for="aHeight">สูง (px)</label>
                <input type="number" id="aHeight" value="160" min="40" max="600" step="10" />
              </div>
            </div>
            <div class="field">
              <label for="aBackend">Backend URL</label>
              <input type="text" id="aBackend" value="https://artshift-backend.kirita.me/api/animate" />
            </div>
            <div class="status" id="aStatus"></div>
            <button class="primary" id="aSubmit" onclick="animateText()">สร้าง GIF แล้วแทรกลงสไลด์</button>
          </section>
        </div>

        <!-- ===== Create custom preset form ===== -->
        <div id="customFormView" class="hidden">
          <section>
            <h2>สร้าง preset ของฉัน</h2>
            <div class="field">
              <label for="cLabel">ชื่อ preset</label>
              <input type="text" id="cLabel" placeholder="เช่น หัวข้อสีส้ม" />
            </div>
            <div class="field">
              <label for="cText">ข้อความ</label>
              <input type="text" id="cText" value="ข้อความของฉัน" />
            </div>
            <div class="row">
              <div class="field">
                <label for="cFont">ฟอนต์</label>
                <select id="cFont">
                  <option>Arial</option>
                  <option>Roboto</option>
                  <option>Montserrat</option>
                  <option>Open Sans</option>
                  <option>Lato</option>
                  <option>Times New Roman</option>
                  <option>Georgia</option>
                  <option>Verdana</option>
                  <option>Courier New</option>
                  <option>Sarabun</option>
                </select>
              </div>
              <div class="field" style="max-width: 90px">
                <label for="cSize">ขนาด</label>
                <input type="number" id="cSize" value="18" min="6" max="400" />
              </div>
            </div>
            <div class="check">
              <input type="checkbox" id="cBold" />
              <label for="cBold">ตัวหนา</label>
            </div>
            <div class="row">
              <div class="field">
                <label for="cAlign">จัดชิด</label>
                <select id="cAlign">
                  <option value="START">ซ้าย</option>
                  <option value="CENTER">กึ่งกลาง</option>
                  <option value="END">ขวา</option>
                </select>
              </div>
              <div class="field">
                <label for="cPosition">ตำแหน่ง</label>
                <select id="cPosition">
                  <option value="upper-left">บนซ้าย</option>
                  <option value="upper-center">บนกลาง</option>
                  <option value="center">กลาง</option>
                  <option value="lower-left">ล่างซ้าย</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label for="cTextColor">สีตัวอักษร</label>
                <input type="color" id="cTextColor" value="#202124" />
              </div>
              <div class="field">
                <label for="cBgColor">สีพื้นหลัง</label>
                <input type="color" id="cBgColor" value="#fde293" />
              </div>
            </div>
            <div class="check">
              <input type="checkbox" id="cHasBg" onchange="toggle('cHasBg','cBgColor')" />
              <label for="cHasBg">ใส่พื้นหลัง</label>
            </div>
            <div class="check">
              <input type="checkbox" id="cHasBorder" onchange="toggleBorder('cHasBorder','cBorderColor','cBorderWeight','cBorderDash')" />
              <label for="cHasBorder">ใส่กรอบ</label>
            </div>
            <div class="row">
              <div class="field">
                <label for="cBorderColor">สีเส้นกรอบ</label>
                <input type="color" id="cBorderColor" value="#1a73e8" disabled />
              </div>
              <div class="field" style="max-width: 110px">
                <label for="cBorderWeight">ความหนา</label>
                <select id="cBorderWeight" disabled>
                  <option value="1">บาง</option>
                  <option value="2">กลาง</option>
                  <option value="4">หนา</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="cBorderDash">แบบเส้น</label>
              <select id="cBorderDash" disabled>
                <option value="SOLID">เส้นทึบ</option>
                <option value="DASH">เส้นประ</option>
                <option value="DOT">เส้นจุด</option>
                <option value="DASH_DOT">ประ-จุด</option>
              </select>
            </div>
            <button class="primary" onclick="saveCustom()">บันทึก preset</button>
          </section>
        </div>
      </main>
    </div>

    <script>
      var DEFAULT_PRESETS = [
        { label: 'หัวข้อใหญ่', text: 'หัวข้อ', fontFamily: 'Montserrat', fontSize: 44, bold: true, textColor: '#202124', hasBackground: false, hasBorder: false, width: 520, height: 90, position: 'upper-center', align: 'CENTER' },
        { label: 'หัวข้อรอง', text: 'หัวข้อรอง', fontFamily: 'Roboto', fontSize: 28, bold: false, textColor: '#5f6368', hasBackground: false, hasBorder: false, width: 420, height: 50, position: 'upper-left', align: 'START' },
        { label: 'คำบรรยาย', text: 'คำอธิบายสั้น ๆ สำหรับสไลด์นี้', fontFamily: 'Roboto', fontSize: 18, bold: false, textColor: '#3c4043', hasBackground: false, hasBorder: false, width: 520, height: 60, position: 'center', align: 'CENTER' },
        { label: 'Callout', text: 'เกร็ดน่ารู้', fontFamily: 'Roboto', fontSize: 18, bold: false, textColor: '#1a73e8', hasBackground: true, backgroundColor: '#e8f0fe', hasBorder: true, borderColor: '#1a73e8', borderWeight: 2, borderDash: 'SOLID', width: 360, height: 60, position: 'center', align: 'CENTER' },
        { label: 'Quote', text: '"คำคมสร้างแรงบันดาลใจ"', fontFamily: 'Georgia', fontSize: 24, bold: false, textColor: '#202124', hasBackground: false, hasBorder: true, borderColor: '#dadce0', borderWeight: 4, borderDash: 'SOLID', width: 500, height: 80, position: 'center', align: 'CENTER' },
        { label: 'ข้อความไทย', text: 'ข้อความภาษาไทย', fontFamily: 'Sarabun', fontSize: 22, bold: false, textColor: '#202124', hasBackground: false, hasBorder: false, width: 420, height: 50, position: 'upper-left', align: 'START' },
        { label: 'Badge', text: 'LABEL', fontFamily: 'Arial', fontSize: 14, bold: true, textColor: '#ffffff', hasBackground: true, backgroundColor: '#ea4335', hasBorder: false, width: 120, height: 36, position: 'upper-left', align: 'CENTER' },
        { label: 'ปุ่ม CTA', text: 'เริ่มเลย', fontFamily: 'Montserrat', fontSize: 16, bold: true, textColor: '#ffffff', hasBackground: true, backgroundColor: '#1a73e8', hasBorder: true, borderColor: '#1a73e8', borderWeight: 1, borderDash: 'SOLID', width: 160, height: 44, position: 'center', align: 'CENTER' },
        { label: 'กรอบคำพูด', text: 'ประโยคสั้นที่น่าจดจำ', fontFamily: 'Georgia', fontSize: 18, bold: false, textColor: '#202124', hasBackground: true, backgroundColor: '#f8f9fa', hasBorder: true, borderColor: '#9aa0a6', borderWeight: 1, borderDash: 'DOT', width: 420, height: 60, position: 'center', align: 'CENTER' },
        { label: 'หมายเหตุ', text: 'หมายเหตุ: ใส่ข้อความอธิบายเพิ่มเติม', fontFamily: 'Arial', fontSize: 12, bold: false, textColor: '#5f6368', hasBackground: false, hasBorder: false, width: 520, height: 36, position: 'lower-left', align: 'START' }
      ];
      var CUSTOMS = [];

      function $(id) { return document.getElementById(id); }
      function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

      function showView(id) {
        ['mainView', 'textView', 'customFormView', 'animateView'].forEach(function (v) { $(v).classList.add('hidden'); });
        $(id).classList.remove('hidden');
      }

      function showMain() {
        showView('mainView');
        $('backBtn').style.display = 'none';
      }

      function showTextPresets() {
        showView('textView');
        $('backBtn').style.display = 'inline';
        loadCustomPresets();
      }

      function showCustomForm() {
        showView('customFormView');
        $('backBtn').style.display = 'inline';
      }

      function showAnimateForm() {
        showView('animateView');
        $('backBtn').style.display = 'inline';
        renderAnimGrid();
      }

      function goBack() {
        if (!$('customFormView').classList.contains('hidden')) {
          showTextPresets();
        } else if (!$('animateView').classList.contains('hidden')) {
          showMain();
        } else {
          showMain();
        }
      }

      function toggle(checkId, targetId) { $(targetId).disabled = !$(checkId).checked; }
      function toggleBorder(checkId, colorId, weightId, dashId) {
        var on = $(checkId).checked;
        [colorId, weightId, dashId].forEach(function (id) { $(id).disabled = !on; });
      }

      function setStatus(msg, kind) {
        var el = $('status');
        el.textContent = msg || '';
        el.className = 'status' + (kind ? ' ' + kind : '');
      }

      function renderPresetCard(p, i, isCustom) {
        var borderStyle = p.borderDash === 'DASH' ? 'dashed' : p.borderDash === 'DOT' ? 'dotted' : 'solid';
        var deleteBtn = isCustom
          ? '<span class="delete" onclick="event.stopPropagation(); deleteCustom(' + i + ')">×</span>'
          : '';
        var cls = 'preset-card' + (isCustom ? ' custom' : '');
        var click = isCustom ? 'insertCustom(' + i + ')' : 'insertDefault(' + i + ')';
        return '<div class="' + cls + '" onclick="' + click + '">' + deleteBtn +
          '<div class="preview" style="background:' + (p.hasBackground ? p.backgroundColor : '#f8f9fa') + ';">' +
            '<span style="font-family:' + p.fontFamily + ';font-size:' + Math.max(12, Math.min(22, p.fontSize)) + 'px;font-weight:' + (p.bold ? 'bold' : 'normal') + ';color:' + p.textColor + ';' +
              'border:' + (p.hasBorder ? '2px ' + borderStyle + ' ' + p.borderColor : 'none') + ';padding:4px 8px;">' + esc(p.text) + '</span>' +
          '</div>' +
          '<div class="label">' + esc(p.label) + '</div>' +
        '</div>';
      }

      function renderPresets() {
        $('textPresets').innerHTML = DEFAULT_PRESETS.map(function (p, i) {
          return renderPresetCard(p, i, false);
        }).join('');
      }

      function renderCustomPresets() {
        if (!CUSTOMS.length) {
          $('customPresets').innerHTML = '<div class="state" style="grid-column: span 2;">ยังไม่มี preset ของคุณ</div>';
          return;
        }
        $('customPresets').innerHTML = CUSTOMS.map(function (p, i) {
          return renderPresetCard(p, i, true);
        }).join('');
      }

      function insertDefault(i) { insertPreset(DEFAULT_PRESETS[i]); }
      function insertCustom(i) { insertPreset(CUSTOMS[i]); }
      function insertPreset(p) {
        setStatus('กำลังเพิ่ม ' + p.label + '…');
        google.script.run
          .withSuccessHandler(function () {
            setStatus('เพิ่ม ' + p.label + ' ลงสไลด์แล้ว', 'ok');
            loadContext();
          })
          .withFailureHandler(function (err) {
            setStatus('เพิ่มไม่สำเร็จ: ' + (err && err.message ? err.message : err), 'err');
          })
          .addTextBox(p);
      }

      function loadCustomPresets() {
        google.script.run
          .withSuccessHandler(function (list) {
            CUSTOMS = list || [];
            renderCustomPresets();
          })
          .withFailureHandler(function (err) {
            setStatus('โหลด preset ไม่สำเร็จ: ' + (err && err.message ? err.message : err), 'err');
          })
          .loadCustomPresets();
      }

      function saveCustom() {
        var preset = {
          label: $('cLabel').value.trim() || 'Preset ของฉัน',
          text: $('cText').value || 'ข้อความ',
          fontFamily: $('cFont').value,
          fontSize: Number($('cSize').value) || 18,
          bold: $('cBold').checked,
          align: $('cAlign').value,
          position: $('cPosition').value,
          textColor: $('cTextColor').value,
          hasBackground: $('cHasBg').checked,
          backgroundColor: $('cBgColor').value,
          hasBorder: $('cHasBorder').checked,
          borderColor: $('cBorderColor').value,
          borderWeight: Number($('cBorderWeight').value) || 1,
          borderDash: $('cBorderDash').value,
          width: 320,
          height: 60
        };
        google.script.run
          .withSuccessHandler(function (list) {
            CUSTOMS = list || [];
            renderCustomPresets();
            showTextPresets();
            setStatus('บันทึก preset แล้ว', 'ok');
          })
          .withFailureHandler(function (err) {
            alert('บันทึกไม่สำเร็จ: ' + (err && err.message ? err.message : err));
          })
          .saveCustomPreset(preset);
      }

      function setAnimateStatus(msg, kind) {
        var el = $('aStatus');
        el.textContent = msg || '';
        el.className = 'status' + (kind ? ' ' + kind : '');
      }

      // Fallback animation list (synced with backend ANIMATION_LABELS).
      var ANIMATION_LIST = [
        { id: 'fade-in', label: 'Fade in', emoji: '✨' },
        { id: 'slide-up', label: 'Slide up', emoji: '⬆️' },
        { id: 'slide-down', label: 'Slide down', emoji: '⬇️' },
        { id: 'slide-left', label: 'Slide left', emoji: '⬅️' },
        { id: 'slide-right', label: 'Slide right', emoji: '➡️' },
        { id: 'zoom-in', label: 'Zoom in', emoji: '🔍' },
        { id: 'zoom-out', label: 'Zoom out', emoji: '🔎' },
        { id: 'bounce', label: 'Bounce', emoji: '⚡' },
        { id: 'pulse', label: 'Pulse', emoji: '💓' },
        { id: 'shake', label: 'Shake', emoji: '❗' },
        { id: 'rotate-in', label: 'Rotate in', emoji: '↩️' },
        { id: 'flip-x', label: 'Flip X', emoji: '↔️' },
        { id: 'flip-y', label: 'Flip Y', emoji: '↕️' },
        { id: 'elastic', label: 'Elastic', emoji: '🌀' },
        { id: 'pop', label: 'Pop', emoji: '💥' },
        { id: 'wave', label: 'Wave', emoji: '〰️' },
        { id: 'typewriter', label: 'Typewriter', emoji: '⌨️' },
        { id: 'color-cycle', label: 'Color cycle', emoji: '🌈' },
        { id: 'blur-in', label: 'Blur in', emoji: '💨' },
        { id: 'heartbeat', label: 'Heartbeat', emoji: '❤️' }
      ];

      function getPreviewUrl(animationId) {
        var backend = normalizeBackendUrl($('aBackend').value);
        var transparent = $('aTransparent') && $('aTransparent').checked;
        var url = backend.replace(/\/api\/animate(\/|$)/, '/api/preview/' + animationId);
        if (transparent) {
          url += (url.indexOf('?') === -1 ? '?' : '&') + 'transparent=1';
        }
        return url;
      }

      function renderAnimGrid() {
        var grid = $('animGrid');
        if (!grid) return;
        var selected = $('aAnimation').value;
        var previewUrl = getPreviewUrl('fade-in');
        // If the backend URL is not set yet, render a placeholder gallery.
        var hasBackend = !!previewUrl;
        grid.innerHTML = ANIMATION_LIST.map(function (a) {
          var cls = 'anim-card' + (a.id === selected ? ' selected' : '');
          var img = hasBackend
            ? '<img class="preview" src="' + esc(getPreviewUrl(a.id)) + '" alt="' + esc(a.label) + '" loading="lazy" onerror="this.style.display=\'none\'">'
            : '';
          return '<div class="' + cls + '" onclick="selectAnimation(\'' + a.id + '\')" title="' + esc(a.label) + '">' +
            img +
            '<span class="label">' + esc(a.label) + '</span>' +
          '</div>';
        }).join('');
      }

      function selectAnimation(id) {
        $('aAnimation').value = id;
        renderAnimGrid();
      }

      function normalizeBackendUrl(url) {
        url = String(url || '').trim();
        if (!url) return '';
        // Add scheme if missing.
        if (!/^https?:\/\//i.test(url)) {
          url = 'https://' + url;
        }
        // Add endpoint path if missing.
        if (!/\/api\/animate(\/|$)/i.test(url)) {
          url = url.replace(/\/$/, '') + '/api/animate';
        }
        return url;
      }

      function animateText() {
        var backend = normalizeBackendUrl($('aBackend').value);
        if (!backend) {
          setAnimateStatus('กรุณาใส่ Backend URL ก่อน', 'err');
          return;
        }
        // Update the input so the user sees the corrected URL.
        $('aBackend').value = backend;
        var opts = {
          text: $('aText').value || 'สวัสดี',
          animation: $('aAnimation').value,
          duration: Number($('aDuration').value) || 2,
          fontFamily: $('aFont').value + ', sans-serif',
          fontSize: Number($('aFontSize').value) || 64,
          bold: $('aBold').checked,
          transparent: $('aTransparent').checked,
          textColor: $('aTextColor').value,
          backgroundColor: $('aBgColor').value,
          width: Number($('aWidth').value) || 640,
          height: Number($('aHeight').value) || 160,
          backendUrl: backend
        };
        $('aSubmit').disabled = true;
        setAnimateStatus('กำลังสร้าง GIF ที่ backend… อาจใช้เวลา 5-15 วินาที');
        google.script.run
          .withSuccessHandler(function (res) {
            $('aSubmit').disabled = false;
            var debug = res && res.debug ? ' (transparent=' + res.debug.receivedTransparent + ')' : '';
            setAnimateStatus('แทรก GIF ลงสไลด์แล้ว' + debug, 'ok');
            loadContext();
          })
          .withFailureHandler(function (err) {
            $('aSubmit').disabled = false;
            setAnimateStatus('ไม่สำเร็จ: ' + (err && err.message ? err.message : err), 'err');
          })
          .animateTextToSlide(opts);
      }

      function deleteCustom(i) {
        var id = CUSTOMS[i].id;
        if (!id) return;
        if (!confirm('ลบ preset "' + CUSTOMS[i].label + '"?')) return;
        google.script.run
          .withSuccessHandler(function (list) {
            CUSTOMS = list || [];
            renderCustomPresets();
            setStatus('ลบ preset แล้ว', 'ok');
          })
          .withFailureHandler(function (err) {
            alert('ลบไม่สำเร็จ: ' + (err && err.message ? err.message : err));
          })
          .deleteCustomPreset(id);
      }

      function renderContext(ctx) {
        var box = $('ctx');
        if (!ctx.slides.length) { box.innerHTML = '<div class="state">ไม่มีสไลด์</div>'; return; }
        box.innerHTML = ctx.slides.map(function (s) {
          var parts = ['<div class="slide"><h3>สไลด์ ' + s.index + '</h3>'];
          if (s.texts && s.texts.length) parts.push('<div class="txt">' + esc(s.texts.join('\n')) + '</div>'); else parts.push('<div class="empty">(ไม่มีข้อความ)</div>');
          if (s.notes) parts.push('<div class="notes">โน้ต: ' + esc(s.notes) + '</div>');
          var tags = [];
          if (s.layout) tags.push(s.layout);
          if (s.imageCount) tags.push(s.imageCount + ' รูป');
          if (s.tableCount) tags.push(s.tableCount + ' ตาราง');
          if (tags.length) parts.push('<div class="tags">' + esc(tags.join(' · ')) + '</div>');
          parts.push('</div>');
          return parts.join('');
        }).join('');
      }

      function loadContext() {
        $('ctx').innerHTML = '<div class="state"><span class="spinner"></span> กำลังอ่านบริบท…</div>';
        google.script.run
          .withSuccessHandler(renderContext)
          .withFailureHandler(function (err) {
            $('ctx').innerHTML = '<div class="state err">อ่านบริบทไม่สำเร็จ: ' + esc(err && err.message ? err.message : err) + '</div>';
          })
          .readPresentationContext();
      }

      renderPresets();
      loadContext();
    </script>
  </body>
</html>
